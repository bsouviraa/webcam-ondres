name: Scrape météo & animations Ondres

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run scraper
        run: python3 scraper.py > output.json

      - name: Split outputs
        run: |
          python3 -c "
          import json
          with open('output.json') as f:
              d = json.load(f)
          with open('data.json', 'w') as f:
              json.dump(d['meteo'], f, ensure_ascii=False, indent=2)
          with open('animations.json', 'w') as f:
              json.dump(d['animations'], f, ensure_ascii=False, indent=2)
          "

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json animations.json
          git diff --staged --quiet || git commit -m "chore: update meteo + animations"
          git push
