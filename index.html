<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plage d'Ondres — Green Resort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1f2024;
      --gold:   #bf9958;
      --white:  #ffffff;
      --muted:  #8a8a8a;
      --card:   #2c2f34;
      --radius: 12px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }

    /* ── LOGO ── */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 1.5rem 0;
    }
    .top-bar img {
      height: 48px;
      width: auto;
      filter: brightness(1.1);
    }

    /* ── LAYOUT ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── WEBCAM ── */
    .webcam-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(191,153,88,0.2);
    }

    .card-label {
      padding: 0.7rem 1.1rem;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      border-bottom: 1px solid rgba(191,153,88,0.15);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #e74c3c;
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .webcam-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }
    .webcam-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── WIDGET MÉTÉO (en dessous, pleine largeur) ── */
    .meteo-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid rgba(191,153,88,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .meteo-inner {
      display: flex;
      justify-content: center;
      padding: 0.5rem 0 1rem;
    }

    .meteo-inner iframe {
      border: none;
      display: block;
      max-width: 100%;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1rem 1.5rem 2rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    footer a {
      color: var(--gold);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .top-bar img { height: 36px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <img
      src="https://sp-ao.shortpixel.ai/client/q_glossy,ret_img,w_523,h_82/https://www.green-resort.com/wp-content/uploads/2024/02/logo-green-resort-labels.png"
      alt="Green Resort"
    />
  </div>

  <main>

    <!-- WEBCAM -->
    <div class="webcam-card">
      <div class="card-label">
        <span class="live-dot"></span>
        Webcam — Plage d'Ondres-Océan
      </div>
      <div class="webcam-wrapper">
        <iframe
          src="https://pv.viewsurf.com/722/Ondres-Ocean"
          scrolling="no"
          allowfullscreen="allowfullscreen"
          title="Webcam Plage d'Ondres">
        </iframe>
      </div>
    </div>

    <!-- MÉTÉO -->
    <div class="meteo-card">
      <div class="card-label">Météo & conditions de plage</div>
      <div class="meteo-inner">
        <iframe
          title="Widget Plages des Landes"
          src="https://www.plages-landes.info/widget-plages-des-landes/?plgs=524&cprimary=bf9958&csecondary=1f2024&picto="
          width="340"
          height="580"
          scrolling="no">
        </iframe>
      </div>
    </div>

  </main>

  <footer>
    Webcam <a href="https://www.viewsurf.com" target="_blank" rel="noopener">Viewsurf</a>
    &nbsp;·&nbsp;
    Météo <a href="https://www.plages-landes.info/ondres/" target="_blank" rel="noopener">Plages des Landes</a>
    &nbsp;·&nbsp;
    <a href="https://www.green-resort.com" target="_blank" rel="noopener">Green Resort</a>
  </footer>

</body>
</html>
