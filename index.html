<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plage d'Ondres — Green Resort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1a1c20;
      --card:   #23262b;
      --border: rgba(191,153,88,0.18);
      --gold:   #bf9958;
      --white:  #f2ede6;
      --muted:  #7a7a7a;
      --radius: 14px;
      --header: 56px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }

    /* ── HEADER ── */
    header {
      height: var(--header);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header img { height: 36px; width: auto; }

    /* ── LAYOUT PRINCIPAL : logo gauche | webcam | météo droite ── */
    /* On occupe TOUT ce qui reste sous le header */
    .stage {
      display: flex;
      flex-direction: row;
      height: calc(100vh - var(--header));
      width: 100%;
      overflow: hidden;
    }

    /* Colonne météo droite — largeur fixe */
    .col-meteo {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      overflow-y: auto;
    }

    /* Webcam — prend tout le reste */
    .col-webcam {
      flex: 1 1 0;
      min-width: 0;
      position: relative;
      background: #000;
    }
    .col-webcam iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── MÉTÉO HEADER ── */
    .meteo-head {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.64rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      flex-shrink: 0;
    }

    /* ── MÉTÉO BODY ── */
    .meteo-body {
      padding: 1rem 0.85rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    /* Cellule générique */
    .mcell {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-align: center;
    }
    .mcell .icon  { font-size: 1.8rem; line-height: 1; }
    .mcell .val   {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
    }
    .mcell .val-sm {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
    }
    .mcell .lbl   {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .mcell .sub   { font-size: 0.8rem; color: var(--gold); }

    /* Grille 2 colonnes */
    .mrow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }

    /* Divider */
    .div { height: 1px; background: var(--border); }

    /* Marées */
    .maree-title {
      font-size: 0.64rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.45rem;
    }
    .maree-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
    }
    .maree-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.65rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .maree-item .mtype {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    .maree-item .mheure {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--white);
    }
    .maree-item.haute { border-color: rgba(191,153,88,0.35); }

    /* Ligne eau */
    .eau-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }
    .eau-row .lbl { font-size: 0.65rem; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); }
    .eau-row .val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--gold);
    }

    /* Live dot dans header webcam */
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #e74c3c; flex-shrink: 0;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* Petit footer en bas de la météo */
    .meteo-footer {
      margin-top: auto;
      padding: 0.6rem 0.85rem;
      font-size: 0.6rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .meteo-footer a { color: var(--gold); text-decoration: none; }

    /* RESPONSIVE : sur mobile on empile */
    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .stage { flex-direction: column; height: auto; }
      .col-webcam { aspect-ratio: 16/9; height: auto; }
      .col-meteo { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <header>
    <img
      src="https://www.green-resort.com/wp-content/uploads/2024/02/logo-green-resort-labels.png"
      alt="Green Resort"
    />
  </header>

  <div class="stage">

    <!-- WEBCAM — occupe tout l'espace restant -->
    <div class="col-webcam">
      <iframe
        src="https://pv.viewsurf.com/722/Ondres-Ocean"
        scrolling="no"
        allowfullscreen="allowfullscreen"
        title="Webcam Plage d'Ondres">
      </iframe>
    </div>

    <!-- MÉTÉO — colonne droite -->
    <div class="col-meteo">
      <div class="meteo-head">Météo &amp; conditions</div>
      <div class="meteo-body" id="meteo-body">
        <div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem">Chargement…</div>
      </div>
      <div class="meteo-footer">
        <a href="https://www.plages-landes.info/ondres/" target="_blank" rel="noopener">Plages des Landes</a>
        &nbsp;·&nbsp;
        <a href="https://www.viewsurf.com" target="_blank" rel="noopener">Viewsurf</a>
      </div>
    </div>

  </div>

  <script>
  const PICTOS = {
    'sun':        '☀️',
    'cloud-sun':  '⛅',
    'cloud':      '☁️',
    'rain':       '🌧️',
    'showers':    '🌧️',
    'bolt':       '⛈️',
    'snow':       '❄️',
    'smog':       '🌫️',
    'wind':       '💨',
    'moon':       '🌙',
    'cloud-moon': '🌛',
  };

  function emoji(code) {
    if (!code) return '🌤️';
    for (const [k,v] of Object.entries(PICTOS)) {
      if (code.includes(k)) return v;
    }
    return '🌤️';
  }

  async function loadMeteo() {
    try {
      // 1. API Meilisearch → temp + picto + temp eau
      const msRes = await fetch('https://meiliprod111.apsulis.fr/indexes/pdl-fr/search', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer a1608a72d5e5343758e2636b1a48bc94c96cb40d57327c03fe54bcdb4a4c4490',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ q: 'Ondres', limit: 5 })
      });
      const msData = await msRes.json();
      const commune = msData.hits.find(h => h.type === 'commune' && h.title === 'Ondres');
      const plage   = msData.hits.find(h => h.type === 'plages');

      const temp    = commune?.meteo_temp_air || '—';
      const picto   = emoji(commune?.meteo_picto);
      const tempEau = plage?.temp_eau || 'NC';

      // 2. Page Ondres → vent, lever, coucher, marées, coef, label météo
      const pageRes = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://www.plages-landes.info/ondres/'));
      const html = await pageRes.text();

      const vent = (html.match(/(\d+)<\/span>\s*km\/h/) || [])[1] || '—';
      const lever   = (html.match(/(\d{2}:\d{2})<\/span>[\s\S]{0,250}?Lever/) || [])[1] || '—';
      const coucher = (html.match(/(\d{2}:\d{2})<\/span>[\s\S]{0,250}?Coucher/) || [])[1] || '—';
      const coef  = (html.match(/COEF\.?&nbsp;\s*<span[^>]*>([\d\s/]+)<\/span>/) || [])[1]?.trim() || '—';
      const label = (html.match(/>(Couvert|Ensoleillé|Nuageux|Pluie|Ciel dégagé|Partiellement nuageux|Brouillard|Orage|Bruine)</) || [])[1] || '';
      const marees = [...html.matchAll(/(Haute|Basse)<\/span>\s*<span[^>]*>(\d{2}h\d{2})<\/span>/g)]
        .slice(0,4).map(m => ({ type: m[1], heure: m[2] }));

      document.getElementById('meteo-body').innerHTML = `
        <div class="mcell">
          <div class="icon">${picto}</div>
          <div class="val">${temp}°<span style="font-size:1.2rem">C</span></div>
          <div class="lbl">Température air</div>
          ${label ? '<div class="sub">' + label + '</div>' : ''}
        </div>

        <div class="mcell">
          <div class="icon">💨</div>
          <div class="val">${vent}<span style="font-size:1.2rem"> km/h</span></div>
          <div class="lbl">Vent</div>
        </div>

        <div class="mrow">
          <div class="mcell">
            <div class="icon" style="font-size:1.3rem">🌅</div>
            <div class="val-sm">${lever}</div>
            <div class="lbl">Lever</div>
          </div>
          <div class="mcell">
            <div class="icon" style="font-size:1.3rem">🌇</div>
            <div class="val-sm">${coucher}</div>
            <div class="lbl">Coucher</div>
          </div>
        </div>

        <div class="div"></div>

        <div>
          <div class="maree-title">Marées &nbsp;<span style="color:var(--muted)">coef. ${coef}</span></div>
          <div class="maree-grid">
            ${marees.map(m => `
              <div class="maree-item ${m.type==='Haute'?'haute':''}">
                <span class="mtype">${m.type}</span>
                <span class="mheure">${m.heure}</span>
              </div>`).join('')}
          </div>
        </div>

        ${tempEau !== 'NC' ? `
        <div class="div"></div>
        <div class="eau-row">
          <span class="lbl">🌊 Temp. eau</span>
          <span class="val">${tempEau}°</span>
        </div>` : ''}
      `;
    } catch(e) {
      document.getElementById('meteo-body').innerHTML =
        '<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:0.8rem">Données indisponibles</div>';
      console.error(e);
    }
  }

  loadMeteo();
  setInterval(loadMeteo, 10 * 60 * 1000);
  </script>

</body>
</html>
