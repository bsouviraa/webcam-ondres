<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plage d'Ondres — Green Resort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1a1c20;
      --card:   #23262b;
      --border: rgba(191,153,88,0.18);
      --gold:   #bf9958;
      --white:  #f2ede6;
      --muted:  #7a7a7a;
      --radius: 14px;
      --header: 56px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }

    /* ── HEADER supprimé — logo dans colonne météo ── */

    /* ── LAYOUT PRINCIPAL : webcam gauche | météo droite ── */
    .stage {
      display: flex;
      flex-direction: row;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* Colonne météo droite — largeur fixe */
    .col-meteo {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      overflow-y: auto;
    }

    /* Webcam — prend tout le reste */
    .col-webcam {
      flex: 1 1 0;
      min-width: 0;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    .col-webcam iframe {
      position: absolute;
      /* Centrer et couvrir tout l'espace — la webcam Viewsurf est en 16/9
         On la rend plus grande que le container et on centre */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Largeur min = 100%, hauteur min = 100vh-header
         Pour couvrir, on choisit le plus grand des deux selon l'aspect ratio */
      width: 177.78vh; /* 16/9 * 100vh */
      height: 100%;
      min-width: 100%;
      min-height: 56.25vw; /* 9/16 * 100vw */
      border: none;
      display: block;
    }

    /* ── LOGO dans colonne météo ── */
    .meteo-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--card);
    }
    .meteo-logo img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    /* ── MÉTÉO HEADER ── */
    .meteo-head {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.64rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      flex-shrink: 0;
    }

    /* ── MÉTÉO BODY ── */
    .meteo-body {
      padding: 1rem 0.85rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    /* Cellule générique */
    .mcell {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-align: center;
    }
    .mcell .icon  { font-size: 1.8rem; line-height: 1; }
    .mcell .val   {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
    }
    .mcell .val-sm {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
    }
    .mcell .lbl   {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .mcell .sub   { font-size: 0.8rem; color: var(--gold); }

    /* Grille 2 colonnes */
    .mrow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }

    /* Divider */
    .div { height: 1px; background: var(--border); }

    /* Marées */
    .maree-title {
      font-size: 0.64rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.45rem;
    }
    .maree-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
    }
    .maree-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.65rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .maree-item .mtype {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    .maree-item .mheure {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--white);
    }
    .maree-item.haute { border-color: rgba(191,153,88,0.35); }

    /* Ligne eau */
    .eau-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }
    .eau-row .lbl { font-size: 0.65rem; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); }
    .eau-row .val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--gold);
    }

    /* Live dot dans header webcam */
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #e74c3c; flex-shrink: 0;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* Petit footer en bas de la météo */
    .meteo-footer {
      margin-top: auto;
      padding: 0.6rem 0.85rem;
      font-size: 0.6rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .meteo-footer a { color: var(--gold); text-decoration: none; }

    /* RESPONSIVE : sur mobile on empile */
    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .stage { flex-direction: column; height: auto; }
      .col-webcam { aspect-ratio: 16/9; height: auto; }
      .col-meteo { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <div class="stage">

    <!-- WEBCAM — occupe tout l'espace restant -->
    <div class="col-webcam">
      <iframe
        src="https://pv.viewsurf.com/722/Ondres-Ocean"
        scrolling="no"
        allowfullscreen="allowfullscreen"
        title="Webcam Plage d'Ondres">
      </iframe>
    </div>

    <!-- MÉTÉO — colonne droite -->
    <div class="col-meteo">
      <div class="meteo-head">Météo &amp; conditions</div>
      <div class="meteo-body" id="meteo-body">
        <div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem">Chargement…</div>
      </div>
      <div class="meteo-footer">
        <a href="https://www.plages-landes.info/ondres/" target="_blank" rel="noopener">Plages des Landes</a>
        &nbsp;·&nbsp;
        <a href="https://www.viewsurf.com" target="_blank" rel="noopener">Viewsurf</a>
      </div>
    </div>

  </div>

  <script>
  const PICTOS = {
    'sun':        '☀️',
    'cloud-sun':  '⛅',
    'cloud':      '☁️',
    'rain':       '🌧️',
    'showers':    '🌧️',
    'bolt':       '⛈️',
    'snow':       '❄️',
    'smog':       '🌫️',
    'wind':       '💨',
    'moon':       '🌙',
    'cloud-moon': '🌛',
  };

  function emoji(code) {
    if (!code) return '🌤️';
    for (const [k,v] of Object.entries(PICTOS)) {
      if (code.includes(k)) return v;
    }
    return '🌤️';
  }

  async function loadMeteo() {
    try {
      const res = await fetch('./data.json?cb=' + Date.now());
      const d = await res.json();

      const picto  = emoji(d.meteo_picto);
      const temp   = d.temp_air || '—';
      const vent   = d.vent_kmh || '—';
      const ventDeg = d.vent_deg || '0';
      const ventCard = d.vent_cardinal || '';
      const uvVal  = d.uv || '—';
      const uvLabel = (d.uv_label ? 'Risque ' + d.uv_label : '');
      const uvColor = {'Risque Faible':'#4caf50','Risque Modéré':'#ffeb3b','Risque Élevé':'#ff9800','Risque Très élevé':'#f44336','Risque Extrême':'#9c27b0'}[uvLabel] || 'var(--gold)';
      const lever   = d.lever || '—';
      const coucher = d.coucher || '—';
      const coef    = d.maree_coef || '—';
      const marees  = d.marees || [];
      const tempEau = d.temp_eau || 'NC';
      const houle   = d.houle_m ? d.houle_m + ' m' : '';
      const label   = d.meteo_label || '';

      document.getElementById('meteo-body').innerHTML = `
        <div class="mcell">
          <div class="icon">${picto}</div>
          <div class="val">${temp}°<span style="font-size:1.2rem">C</span></div>
          <div class="lbl">Température air</div>
          ${label ? '<div class="sub">' + label + '</div>' : ''}
        </div>

        <div class="mcell">
          <div class="icon" style="font-size:1.4rem;transform:rotate(${ventDeg}deg);display:inline-block">↑</div>
          <div class="val">${vent}<span style="font-size:1.2rem"> km/h</span></div>
          <div class="lbl">Vent — ${ventCard}</div>
        </div>

        <div class="mcell">
          <div class="icon">🌞</div>
          <div class="val" style="font-size:2rem">${uvVal}</div>
          <div class="lbl">Indice UV</div>
          <div class="sub" style="font-size:0.72rem;color:${uvColor}">${uvLabel}</div>
        </div>

        <div class="mrow">
          <div class="mcell">
            <div class="icon" style="font-size:1.3rem">🌅</div>
            <div class="val-sm">${lever}</div>
            <div class="lbl">Lever</div>
          </div>
          <div class="mcell">
            <div class="icon" style="font-size:1.3rem">🌇</div>
            <div class="val-sm">${coucher}</div>
            <div class="lbl">Coucher</div>
          </div>
        </div>

        ${houle ? `<div class="mcell">
          <div class="icon">🌊</div>
          <div class="val" style="font-size:1.8rem">${houle}</div>
          <div class="lbl">Houle</div>
        </div>` : ''}

        <div class="div"></div>

        <div>
          <div class="maree-title">Marées &nbsp;<span style="color:var(--muted)">coef. ${coef}</span></div>
          <div class="maree-grid">
            ${marees.map(m => `
              <div class="maree-item ${m.type==='Haute'?'haute':''}">
                <span class="mtype">${m.type}</span>
                <span class="mheure">${m.heure}</span>
              </div>`).join('')}
          </div>
        </div>

        ${tempEau !== 'NC' ? `
        <div class="div"></div>
        <div class="eau-row">
          <span class="lbl">🌊 Temp. eau</span>
          <span class="val">${tempEau}°</span>
        </div>` : ''}
      `;
    } catch(e) {
      document.getElementById('meteo-body').innerHTML =
        '<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:0.8rem">Données indisponibles</div>';
      console.error('Meteo error:', e);
    }
  }

  function degreesToCardinal(deg) {
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
    return dirs[Math.round(parseInt(deg) / 22.5) % 16];
  }

  loadMeteo();
  setInterval(loadMeteo, 10 * 60 * 1000);
  </script>

</body>
</html>
