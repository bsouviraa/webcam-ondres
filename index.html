<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plage d'Ondres — Green Resort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1a1c20;
      --card:   #23262b;
      --border: rgba(191,153,88,0.18);
      --gold:   #bf9958;
      --white:  #f2ede6;
      --muted:  #7a7a7a;
      --radius: 14px;
      --header: 56px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }

    /* ── HEADER supprimé — logo dans colonne météo ── */

    /* ── LAYOUT PRINCIPAL : webcam gauche | météo droite ── */
    .stage {
      display: flex;
      flex-direction: row;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* Colonne météo droite — largeur fixe */
    .col-meteo {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      overflow-y: auto;
    }

    /* Webcam — prend tout le reste */
    .col-webcam {
      flex: 1 1 0;
      min-width: 0;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    .col-webcam iframe {
      position: absolute;
      /* Centrer et couvrir tout l'espace — la webcam Viewsurf est en 16/9
         On la rend plus grande que le container et on centre */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Largeur min = 100%, hauteur min = 100vh-header
         Pour couvrir, on choisit le plus grand des deux selon l'aspect ratio */
      width: 177.78vh; /* 16/9 * 100vh */
      height: 100%;
      min-width: 100%;
      min-height: 56.25vw; /* 9/16 * 100vw */
      border: none;
      display: block;
    }

    /* ── LOGO dans colonne météo ── */
    .meteo-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--card);
    }
    .meteo-logo img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    /* ── MÉTÉO HEADER ── */
    .meteo-head {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.64rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      flex-shrink: 0;
    }

    /* ── MÉTÉO BODY ── */
    .meteo-body {
      padding: 0.85rem 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      overflow-y: auto;
    }

    /* Section label */
    .msection {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 0.2rem 0 0.1rem;
      border-bottom: 1px solid var(--border);
    }

    /* Bloc double : temp air + eau côte à côte */
    .mrow2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; }

    /* Cellule générique */
    .mcell {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 0.6rem 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
    }
    .mcell .icon  { font-size: 1.5rem; line-height: 1; }
    .mcell .val   {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
    }
    .mcell .val-sm {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
    }
    .mcell .val-xs {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }
    .mcell .lbl {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .mcell .sub { font-size: 0.75rem; color: var(--gold); }
    .mcell .sub-colored { font-size: 0.72rem; font-weight: 500; }

    /* Drapeau */
    .drapeau-bar {
      border-radius: 8px;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
    }
    .drapeau-bar .dlbl { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .drapeau-bar .dval { font-size: 0.82rem; font-weight: 500; letter-spacing: 0.05em; }
    .drapeau-bar .dflag { font-size: 1.2rem; }

    /* Grille 2 colonnes */
    .mrow { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; }

    /* Divider */
    .div { height: 1px; background: var(--border); margin: 0.1rem 0; }

    /* Marées */
    .maree-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
    .maree-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.65rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .maree-item .mtype { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .maree-item .mheure {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--white);
    }
    .maree-item.haute { border-color: rgba(191,153,88,0.3); }

    /* Live dot dans header webcam */
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #e74c3c; flex-shrink: 0;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── OVERLAY NUIT ── */
    .night-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 12, 18, 0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
      z-index: 10;
      backdrop-filter: blur(2px);
    }
    .night-overlay .night-icon { font-size: 3.5rem; line-height: 1; }
    .night-overlay .night-msgs {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
    }
    .night-overlay .night-msg {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      letter-spacing: 0.03em;
      line-height: 1.35;
    }
    .night-overlay .night-msg.lang-fr { font-size: 1.35rem; color: var(--white); }
    .night-overlay .night-msg.lang-en { font-size: 1.05rem; color: rgba(242,237,230,0.65); }
    .night-overlay .night-msg.lang-es { font-size: 1.05rem; color: rgba(242,237,230,0.55); }
    .night-overlay .night-next {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── SÉLECTEUR LANGUE ── */
    .lang-bar {
      position: absolute;
      bottom: 0.85rem;
      right: 0.85rem;
      display: flex;
      gap: 0.4rem;
      z-index: 20;
    }
    .lang-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.55rem;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .lang-btn:hover, .lang-btn.active {
      background: rgba(191,153,88,0.18);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Petit footer en bas de la météo */
    .meteo-footer {
      margin-top: auto;
      padding: 0.6rem 0.85rem;
      font-size: 0.6rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .meteo-footer a { color: var(--gold); text-decoration: none; }

    /* RESPONSIVE : sur mobile on empile */
    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .stage { flex-direction: column; height: auto; }
      .col-webcam { aspect-ratio: 16/9; height: auto; }
      .col-meteo { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <div class="stage">

    <!-- WEBCAM — occupe tout l'espace restant -->
    <div class="col-webcam">
      <iframe
        src="https://pv.viewsurf.com/722/Ondres-Ocean"
        scrolling="no"
        allowfullscreen="allowfullscreen"
        title="Webcam Plage d'Ondres">
      </iframe>
      <!-- Overlay nuit (affiché entre 22h et 6h) -->
      <div class="night-overlay" id="night-overlay" style="display:none">
        <div class="night-icon">🌙</div>
        <div class="night-msgs">
          <div class="night-msg lang-fr" id="night-fr">La webcam est mise à jour entre 6h et 22h.<br>Prochaine image demain matin.</div>
          <div class="night-msg lang-en" id="night-en">The webcam is updated between 6am and 10pm.<br>Next image tomorrow morning.</div>
          <div class="night-msg lang-es" id="night-es">La cámara web se actualiza entre las 6h y las 22h.<br>Próxima imagen mañana por la mañana.</div>
        </div>
        <div class="night-next" id="night-next"></div>
      </div>
      <!-- Sélecteur de langue -->
      <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('es')">ES</button>
      </div>
    </div>

    <!-- MÉTÉO — colonne droite -->
    <div class="col-meteo">
      <div class="meteo-logo">
        <img src="https://www.green-resort.com/wp-content/uploads/2026/04/Logo-Green-Resort-5-etoiles-FOND-BLANC.jpeg" alt="Green Resort" />
      </div>
      <div class="meteo-head" id="meteo-head-txt">Météo &amp; conditions</div>
      <div class="meteo-body" id="meteo-body">
        <div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem">Chargement…</div>
      </div>
      <div class="meteo-footer">
        <a href="https://www.plages-landes.info/ondres/" target="_blank" rel="noopener">Plages des Landes</a>
        &nbsp;·&nbsp;
        <a href="https://www.viewsurf.com" target="_blank" rel="noopener">Viewsurf</a>
      </div>
    </div>

  </div>

  <script>
  // ── Traductions ──────────────────────────────────────────────────────────
  const T = {"fr": {"meteo_title": "Météo &amp; conditions", "temp": "Températures", "air": "Air", "eau": "Eau", "hors_saison": "hors saison", "drapeau": "Drapeau", "non_surv": "Non surveillée", "surv": "Surveillée", "vent": "Vent", "soleil": "Soleil", "uv": "Indice UV", "lever": "Lever", "coucher": "Coucher", "houle": "🌊 Houle", "hauteur": "Hauteur", "periode": "Période", "marees": "Marées", "haute": "Haute", "basse": "Basse", "coef": "coef.", "updated": "Mis à jour"}, "en": {"meteo_title": "Weather &amp; conditions", "temp": "Temperatures", "air": "Air", "eau": "Water", "hors_saison": "off season", "drapeau": "Flag", "non_surv": "Unsupervised", "surv": "Supervised", "vent": "Wind", "soleil": "Sun", "uv": "UV Index", "lever": "Sunrise", "coucher": "Sunset", "houle": "🌊 Swell", "hauteur": "Height", "periode": "Period", "marees": "Tides", "haute": "High", "basse": "Low", "coef": "coef.", "updated": "Updated"}, "es": {"meteo_title": "Tiempo &amp; condiciones", "temp": "Temperaturas", "air": "Aire", "eau": "Agua", "hors_saison": "fuera de temporada", "drapeau": "Bandera", "non_surv": "No vigilada", "surv": "Vigilada", "vent": "Viento", "soleil": "Sol", "uv": "Índice UV", "lever": "Amanecer", "coucher": "Atardecer", "houle": "🌊 Oleaje", "hauteur": "Altura", "periode": "Período", "marees": "Mareas", "haute": "Alta", "basse": "Baja", "coef": "coef.", "updated": "Actualizado"}};
  const DRAP_LABELS = {"fr": {"vert": "Baignade autorisée", "jaune": "Baignade surveillée", "rouge": "Baignade interdite", "nc": "", "": ""}, "en": {"vert": "Swimming allowed", "jaune": "Supervised swimming", "rouge": "Swimming forbidden", "nc": "", "": ""}, "es": {"vert": "Baño permitido", "jaune": "Baño vigilado", "rouge": "Baño prohibido", "nc": "", "": ""}};
  let currentLang = localStorage.getItem('lang') || 'fr';

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
    document.getElementById('meteo-head-txt').innerHTML = T[lang].meteo_title;
    renderMeteo(window._meteoData);
  }

  // ── Overlay nuit ─────────────────────────────────────────────────────────
  function checkNight() {
    const now = new Date();
    const h = now.getHours();
    const isNight = h >= 22 || h < 6;
    const overlay = document.getElementById('night-overlay');
    overlay.style.display = isNight ? 'flex' : 'none';
    if (isNight) {
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(6, 0, 0, 0);
      const diff = Math.round((tomorrow - now) / 60000);
      const hLeft = Math.floor(diff / 60), mLeft = diff % 60;
      const nextMsgs = {
        fr: `Dans ${hLeft}h${mLeft.toString().padStart(2,'0')}`,
        en: `In ${hLeft}h${mLeft.toString().padStart(2,'0')}`,
        es: `En ${hLeft}h${mLeft.toString().padStart(2,'0')}`,
      };
      document.getElementById('night-next').textContent = nextMsgs[currentLang] || nextMsgs.fr;
    }
  }
  setInterval(checkNight, 30000);

  // ── Pictos météo ─────────────────────────────────────────────────────────
  const PICTOS = {
    'sun': '☀️', 'cloud-sun': '⛅', 'cloud': '☁️', 'rain': '🌧️',
    'showers': '🌧️', 'bolt': '⛈️', 'snow': '❄️', 'smog': '🌫️',
    'wind': '💨', 'moon': '🌙', 'cloud-moon': '🌛',
  };
  function emoji(code) {
    if (!code) return '🌤️';
    for (const [k,v] of Object.entries(PICTOS)) { if (code.includes(k)) return v; }
    return '🌤️';
  }

  // ── Rendu météo ──────────────────────────────────────────────────────────
  function renderMeteo(d) {
    if (!d) return;
    const lang = currentLang;
    const t = T[lang];

    const picto    = emoji(d.meteo_picto);
    const temp     = d.temp_air || '—';
    const tempEau  = d.temp_eau || 'NC';
    const vent     = d.vent_kmh || '—';
    const ventDeg  = d.vent_deg || '0';
    const ventCard = d.vent_cardinal || '';
    const uvVal    = d.uv || '—';
    const uvLabel  = d.uv_label ? 'Risque ' + d.uv_label : '';
    const uvColor  = {'Risque Faible':'#4caf50','Risque Modéré':'#ffeb3b','Risque Élevé':'#ff9800','Risque Très élevé':'#f44336','Risque Extrême':'#9c27b0'}[uvLabel] || 'var(--gold)';
    const uvShort  = d.uv_label || '';
    const lever    = d.lever || '—';
    const coucher  = d.coucher || '—';
    const coef     = d.maree_coef || '—';
    const marees   = d.marees || [];
    const houle    = d.houle_m ? d.houle_m + ' m' : '';
    const label    = d.meteo_label || '';
    const drap     = d.drapeau || 'nc';
    const drapColor = { vert: '#4caf50', jaune: '#ffeb3b', rouge: '#f44336', nc: 'var(--muted)', '': 'var(--muted)' }[drap];
    const drapEmoji = { vert: '🟢', jaune: '🟡', rouge: '🔴', nc: '⚫', '': '⚫' }[drap];
    const drapLabel = (DRAP_LABELS[lang][drap] || '') || (d.surv_label || t.non_surv);

    document.getElementById('meteo-body').innerHTML = `
      <!-- TEMPÉRATURES -->
      <div class="msection">${t.temp}</div>
      <div class="mrow2">
        <div class="mcell">
          <div class="icon">${picto}</div>
          <div class="val">${temp}°<span style="font-size:1rem">C</span></div>
          <div class="lbl">${t.air}</div>
          ${label ? '<div class="sub">' + label + '</div>' : ''}
        </div>
        <div class="mcell">
          <div class="icon">🌊</div>
          <div class="${tempEau === 'NC' ? 'val-xs' : 'val'}">${tempEau === 'NC' ? 'NC' : tempEau + '°'}</div>
          <div class="lbl">${t.eau}</div>
          ${tempEau === 'NC' ? `<div class="sub" style="font-size:0.6rem;color:var(--muted)">${t.hors_saison}</div>` : ''}
        </div>
      </div>

      <!-- DRAPEAU -->
      <div class="drapeau-bar" style="background:rgba(${drap==='vert'?'76,175,80':drap==='jaune'?'255,235,59':drap==='rouge'?'244,67,54':'255,255,255'},0.08)">
        <span class="dlbl">${t.drapeau}</span>
        <span class="dval" style="color:${drapColor}">${drapLabel}</span>
        <span class="dflag">${drapEmoji}</span>
      </div>

      <!-- VENT -->
      <div class="msection">${t.vent}</div>
      <div class="mcell">
        <div style="display:flex;align-items:center;gap:0.75rem;justify-content:center">
          <span style="font-size:1.8rem;transform:rotate(${ventDeg}deg);display:inline-block;line-height:1">↑</span>
          <div>
            <div class="val" style="font-size:2rem;text-align:left">${vent}<span style="font-size:1rem"> km/h</span></div>
            <div class="lbl" style="text-align:left">${ventCard}</div>
          </div>
        </div>
      </div>

      <!-- SOLEIL + UV -->
      <div class="msection">${t.soleil}</div>
      <div class="mrow">
        <div class="mcell">
          <div class="icon">🌞</div>
          <div class="val" style="font-size:1.9rem">${uvVal}</div>
          <div class="lbl">${t.uv}</div>
          <div class="sub-colored" style="color:${uvColor}">${uvShort}</div>
        </div>
        <div class="mrow2" style="gap:0.4rem">
          <div class="mcell">
            <div class="icon" style="font-size:1.2rem">🌅</div>
            <div class="val-sm">${lever}</div>
            <div class="lbl">${t.lever}</div>
          </div>
          <div class="mcell">
            <div class="icon" style="font-size:1.2rem">🌇</div>
            <div class="val-sm">${coucher}</div>
            <div class="lbl">${t.coucher}</div>
          </div>
        </div>
      </div>

      <!-- HOULE -->
      ${houle ? `<div class="msection">${t.houle}</div>
      <div class="mcell">
        <div style="display:flex;gap:1.5rem;align-items:center;justify-content:center">
          <div class="icon" style="font-size:2rem;line-height:1">🌊</div>
          <div><div class="val" style="font-size:2rem">${houle}</div><div class="lbl">${t.hauteur}</div></div>
          <div><div class="val-sm">${d.houle_periode}s</div><div class="lbl">${t.periode}</div></div>
        </div>
      </div>` : ''}

      <!-- MARÉES -->
      <div class="msection">${t.marees} <span style="color:var(--muted);font-size:0.95em">${t.coef} ${coef}</span></div>
      <div class="maree-grid">
        ${marees.map(m => `
          <div class="maree-item ${m.type==='Haute'||m.type==='High'||m.type==='Alta'?'haute':''}">
            <span class="mtype">${m.type==='Haute'?t.haute:m.type==='Basse'?t.basse:m.type}</span>
            <span class="mheure">${m.heure}</span>
          </div>`).join('')}
      </div>
    `;
  }

  // ── Chargement données ───────────────────────────────────────────────────
  async function loadMeteo() {
    try {
      const res = await fetch('./data.json?cb=' + Date.now());
      window._meteoData = await res.json();
      renderMeteo(window._meteoData);
    } catch(e) {
      document.getElementById('meteo-body').innerHTML =
        '<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:0.8rem">Données indisponibles</div>';
      console.error('Meteo error:', e);
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === currentLang.toUpperCase())
  );
  document.getElementById('meteo-head-txt').innerHTML = T[currentLang].meteo_title;
  checkNight();
  loadMeteo();
  setInterval(loadMeteo, 10 * 60 * 1000);
  </script>

</body>
</html>
